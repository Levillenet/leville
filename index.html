<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Default title - will be overridden by react-helmet-async per page -->
    <title>Leville.net</title>
    
    <!-- Author meta - global -->
    <meta name="author" content="Leville.net" />
    
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Bing Webmaster Tools verification -->
    <meta name="msvalidate.01" content="A7939E8C8F8AD766041B6E438F42BDBC" />
    
    <!-- Hreflang tags are managed dynamically by HreflangTags.tsx component -->
    
    <!-- 
      IMPORTANT: All SEO meta tags (description, og:*, twitter:*) are managed 
      dynamically per-page via react-helmet-async. Do NOT add static meta 
      description, og:title, og:description, twitter:title, or twitter:description 
      here as they will cause duplication issues.
    -->

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a1628" />

    <!-- Microsoft Clarity loaded dynamically via CookieConsent component -->

    <!-- LCP Fix 1: Preload hero image so browser fetches it before JS bundle -->
    <link rel="preload" as="image" href="/hero-chalet.jpg" fetchpriority="high">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"></noscript>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Raleway:wght@400;700&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Raleway:wght@400;700&display=optional" rel="stylesheet"></noscript>

  </head>

  <body style="background-color:#152030">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
