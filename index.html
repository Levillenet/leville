<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Default title - will be overridden by react-helmet-async per page -->
    <title>Leville.net</title>
    
    <!-- Author meta - global -->
    <meta name="author" content="Leville.net" />
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6BR1JFF2Q8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6BR1JFF2Q8');
    </script>
    <!-- Track outbound clicks to Moder booking system -->
    <script>
      document.addEventListener('click', function(e) {
        var link = e.target.closest ? e.target.closest('a') : null;
        if (link && link.href && link.href.indexOf('app.moder.fi') !== -1) {
          if (typeof gtag === 'function') {
            gtag('event', 'accommodation_search', {
              event_category: 'booking',
              event_label: link.href,
              page_location: window.location.pathname,
              transport_type: 'beacon'
            });
          }
        }
      }, true);
      // Also track via beforeunload for iframe-triggered navigations to Moder
      window.addEventListener('beforeunload', function() {
        if (document.getElementById('moder-embed') && typeof gtag === 'function') {
          navigator.sendBeacon && navigator.sendBeacon(
            'https://www.google-analytics.com/g/collect?v=2&tid=G-6BR1JFF2Q8&en=accommodation_search&ep.event_category=booking&ep.page_location=' +
            encodeURIComponent(window.location.pathname) + '&cid=' +
            ((document.cookie.match(/_ga=GA\\d+\\.\\d+\\.(\\d+\\.\\d+)/) || [])[1] || Math.random())
          );
        }
      });
    </script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Bing Webmaster Tools verification -->
    <meta name="msvalidate.01" content="A7939E8C8F8AD766041B6E438F42BDBC" />
    
    <!-- Hreflang tags are managed dynamically by HreflangTags.tsx component -->
    
    <!-- 
      IMPORTANT: All SEO meta tags (description, og:*, twitter:*) are managed 
      dynamically per-page via react-helmet-async. Do NOT add static meta 
      description, og:title, og:description, twitter:title, or twitter:description 
      here as they will cause duplication issues.
    -->

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a1628" />

    <!-- Microsoft Clarity Analytics - deferred for performance -->
    <script type="text/javascript">
        window.addEventListener('load', function() {
            setTimeout(function() {
                (function(c,l,a,r,i,t,y){
                    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
                    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
                    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
                })(window, document, "clarity", "script", "utrphfjqd1");
            }, 3000);
        });
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&family=Raleway:wght@400;500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
